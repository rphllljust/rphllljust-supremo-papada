services:
  postgres:
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: suap_idep_homolog
      POSTGRES_USER: suap_homolog
      POSTGRES_PASSWORD: suap_homolog

  backend:
    ports:
      - "8001:8000"
    environment:
      APP_ENV: homolog
      SECRET_KEY: troque-por-uma-chave-segura-de-homolog
      DEBUG: "False"
      DJANGO_TEMPLATE_UI_ENABLED: "True"
      ALLOWED_HOSTS: 127.0.0.1,localhost,backend,homolog.suap.idep.local
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:5174,http://localhost:5174,https://homolog.suap.idep.local
      CSRF_TRUSTED_ORIGINS: http://127.0.0.1:5174,http://localhost:5174,https://homolog.suap.idep.local
      DATABASE_ENGINE: django.db.backends.postgresql
      DATABASE_NAME: suap_idep_homolog
      DATABASE_USER: suap_homolog
      DATABASE_PASSWORD: suap_homolog
      DATABASE_CONN_MAX_AGE: 60

  frontend:
    ports:
      - "5174:5174"
    environment:
      VITE_APP_ENV: homolog
      VITE_BACKEND_ORIGIN: http://backend:8000
      VITE_API_URL: /api/v1
      VITE_HOST: 0.0.0.0
      VITE_PORT: 5174
      VITE_DEV_BASE_PATH: /
      VITE_BUILD_BASE_PATH: /static/
      VITE_DEBUG_LOGS: "true"
    command:
      - sh
      - -c
      - |
        npm run dev:homolog -- --host 0.0.0.0 --port 5174