services:
  postgres:
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: suap_idep
      POSTGRES_USER: suap
      POSTGRES_PASSWORD: suap_production

  backend:
    ports:
      - "8002:8000"
    environment:
      APP_ENV: production
      SECRET_KEY: troque-por-uma-chave-segura-de-producao
      DEBUG: "False"
      DJANGO_TEMPLATE_UI_ENABLED: "False"
      ALLOWED_HOSTS: 127.0.0.1,localhost,backend,suap.idep.local
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:4173,http://localhost:4173,https://suap.idep.local
      CSRF_TRUSTED_ORIGINS: http://127.0.0.1:4173,http://localhost:4173,https://suap.idep.local
      DATABASE_ENGINE: django.db.backends.postgresql
      DATABASE_NAME: suap_idep
      DATABASE_USER: suap
      DATABASE_PASSWORD: suap_production
      DATABASE_CONN_MAX_AGE: 300

  frontend:
    ports:
      - "4173:4173"
    environment:
      VITE_APP_ENV: production
      VITE_BACKEND_ORIGIN: http://backend:8000
      VITE_API_URL: /api/v1
      VITE_HOST: 0.0.0.0
      VITE_PORT: 4173
      VITE_DEV_BASE_PATH: /
      VITE_BUILD_BASE_PATH: /static/
      VITE_DEBUG_LOGS: "false"
    command:
      - sh
      - -c
      - |
        npm run dev:production -- --host 0.0.0.0 --port 4173