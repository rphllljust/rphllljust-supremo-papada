services:
  postgres:
    command:
      - postgres
      - -c
      - max_connections=300
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: suap_idep_dev
      POSTGRES_USER: suap_dev
      POSTGRES_PASSWORD: suap_dev
    volumes:
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

  backend:
    ports:
      - "8005:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: development
      SECRET_KEY: django-insecure-dev-troque-isso
      DEBUG: "True"
      DJANGO_TEMPLATE_UI_ENABLED: "True"
      ALLOWED_HOSTS: 127.0.0.1,localhost,backend,.loca.lt,.trycloudflare.com
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:5173,http://localhost:5173,http://127.0.0.1:5175,http://localhost:5175
      CSRF_TRUSTED_ORIGINS: http://127.0.0.1:5173,http://localhost:5173,http://127.0.0.1:5175,http://localhost:5175
      DATABASE_ENGINE: django.db.backends.postgresql
      DATABASE_NAME: suap_idep_dev
      DATABASE_USER: suap_dev
      DATABASE_PASSWORD: suap_dev
      DATABASE_CONN_MAX_AGE: 0
      CERTIFICADOS_VALIDATION_FRONTEND_BASE_URL: http://localhost:5175
      INITIAL_ADMIN_CPF: 90000010057
      INITIAL_ADMIN_PASSWORD: admin
      JWT_ACCESS_TOKEN_LIFETIME_MINUTES: "120"
      JWT_REFRESH_TOKEN_LIFETIME_DAYS: "30"
      JWT_ROTATE_REFRESH_TOKENS: "True"
      JWT_BLACKLIST_AFTER_ROTATION: "True"
      GOOGLE_SHEETS_EXPORT_TOKEN: idep_sheets_bc4d78f7b1d5447ab19d537d2b985781e9a363133e574a96
      GOOGLE_SHEETS_PUBLIC_BASE_URL: https://environments-stephen-inc-cabinets.trycloudflare.com
      GOOGLE_SHEETS_SOURCE_URLS: ""
      GOOGLE_SHEETS_SERVICE_ACCOUNT_JSON: ""
      GOOGLE_SHEETS_SERVICE_ACCOUNT_FILE: ""
      GOOGLE_SHEETS_SERVICE_ACCOUNT_LOCAL_FILE: /app/.google_sheets_service_account.json
    volumes:
      - ./SUAP/backend:/app

  frontend:
    ports:
      - "5175:5173"
    depends_on:
      - backend
    environment:
      VITE_APP_ENV: development
      VITE_BACKEND_ORIGIN: http://backend:8000
      VITE_API_URL: /api/v1
      VITE_HOST: 0.0.0.0
      VITE_PORT: 5173
      VITE_DEV_BASE_PATH: /
      VITE_BUILD_BASE_PATH: /static/
      VITE_DEBUG_LOGS: "true"
    volumes:
      - ./SUAP/frontend:/app
      - frontend_node_modules:/app/node_modules
    command:
      - sh
      - -c
      - |
        npm ci
        npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  frontend_node_modules:





