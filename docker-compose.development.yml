services:
  postgres:
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: suap_idep_dev
      POSTGRES_USER: suap_dev
      POSTGRES_PASSWORD: suap_dev

  backend:
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      SECRET_KEY: django-insecure-dev-troque-isso
      DEBUG: "True"
      DJANGO_TEMPLATE_UI_ENABLED: "True"
      ALLOWED_HOSTS: 127.0.0.1,localhost,backend
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:5173,http://localhost:5173
      CSRF_TRUSTED_ORIGINS: http://127.0.0.1:5173,http://localhost:5173
      DATABASE_ENGINE: django.db.backends.postgresql
      DATABASE_NAME: suap_idep_dev
      DATABASE_USER: suap_dev
      DATABASE_PASSWORD: suap_dev
      DATABASE_CONN_MAX_AGE: 60
    volumes:
      - ./SUAP/backend:/app

  frontend:
    ports:
      - "5173:5173"
    environment:
      VITE_APP_ENV: development
      VITE_BACKEND_ORIGIN: http://backend:8000
      VITE_API_URL: /api/v1
      VITE_HOST: 0.0.0.0
      VITE_PORT: 5173
      VITE_DEV_BASE_PATH: /
      VITE_BUILD_BASE_PATH: /static/
      VITE_DEBUG_LOGS: "true"
    volumes:
      - ./SUAP/frontend:/app
      - frontend_node_modules:/app/node_modules
    command:
      - sh
      - -c
      - |
        npm ci
        npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  frontend_node_modules: