services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      TZ: America/Cuiaba
      PGTZ: America/Cuiaba
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./SUAP/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DJANGO_SEED_DEV_DATA: "0"
      DJANGO_IMPORT_SQLITE_PATH: ""
    command:
      - sh
      - -c
      - |
        if [ -n "$$DJANGO_IMPORT_SQLITE_PATH" ]; then
          python manage.py migrate_sqlite_to_postgres --source "$$DJANGO_IMPORT_SQLITE_PATH" --flush-target
        else
          python manage.py migrate --noinput
          if [ "$$DJANGO_SEED_DEV_DATA" = "1" ]; then
            python manage.py seed_development_data --reset
          fi
        fi
        python manage.py bootstrap_initial_admin
        python manage.py seed_50_alunos
        python manage.py runserver 0.0.0.0:8000

  frontend:
    build:
      context: ./SUAP/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    working_dir: /app

volumes:
  postgres_data: