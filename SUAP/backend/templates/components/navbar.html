<header class="main-header">
  <div class="container header-shell">
    <div class="header-main-row">
      <div class="header-brand-area">
        <div class="header-logo-mark" aria-hidden="true">
          <span class="header-logo-mark-text">IDEP/RO</span>
        </div>

        <div class="brand-block">
          <div class="brand-kicker">Instituto Estadual de Desenvolvimento da Educação Profissional de Rondônia - IDEP/RO</div>
        </div>
      </div>

      {% if request.user.is_authenticated %}
        <div class="header-right">
          <div class="header-quick-actions" aria-label="Ações rápidas">
            <button type="button" class="header-icon-btn" title="Notificações" aria-label="Notificações">
              <span class="icon-bell" aria-hidden="true"></span>
            </button>
            <button type="button" class="header-icon-btn" title="Ajuda e suporte" aria-label="Ajuda e suporte">
              <span class="icon-help" aria-hidden="true"></span>
            </button>
          </div>
        </div>
      {% else %}
        <nav class="main-nav">
          <a class="{% if request.resolver_match.namespace == 'accounts' and request.resolver_match.url_name == 'login' %}active{% endif %}" href="{% url 'accounts:login' %}">Entrar</a>
          <a class="{% if request.resolver_match.namespace == 'accounts' and request.resolver_match.url_name == 'register' %}active{% endif %}" href="{% url 'accounts:register' %}">Cadastro</a>
        </nav>
      {% endif %}
    </div>
  </div>
</header>
