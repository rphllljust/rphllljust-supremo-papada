<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Consulta Pública de Histórico</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7f5;
      margin: 0;
      padding: 40px 20px;
      color: #1f2937;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    h1 {
      margin-top: 0;
      color: #0f5132;
    }
    p {
      line-height: 1.6;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }
    input[type="text"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      margin-top: 16px;
      background: #0f5132;
      color: #fff;
      border: 0;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
    }
    button:hover {
      background: #0b3d26;
    }
    .erro {
      color: #b91c1c;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Consulta Pública de Histórico Escolar</h1>
    <p>Informe o código de validação do documento para consultar a autenticidade do histórico escolar digital.</p>

    <form method="post">
      {% csrf_token %}
      <label for="{{ form.codigo_validacao.id_for_label }}">Código de validação</label>
      {{ form.codigo_validacao }}
      {% if form.codigo_validacao.errors %}
        <div class="erro">{{ form.codigo_validacao.errors }}</div>
      {% endif %}
      <button type="submit">Validar documento</button>
    </form>
  </div>
</body>
</html>
