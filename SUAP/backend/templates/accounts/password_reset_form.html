{% extends "base/base.html" %}

{% block title %}Recuperar senha | {{ APP_NAME }}{% endblock %}

{% block content %}
<section class="card section-box" style="max-width: 560px; margin: 24px auto;">
  <h2>Recuperar senha</h2>
  <p>Informe seu e-mail para receber as instrucoes de redefinicao.</p>
  <form method="post">
    {% csrf_token %}
    <div class="form-group"><label for="id_email">E-mail</label>{{ form.email }}</div>
    <div class="button-row" style="margin-top: 16px;">
      <button class="btn btn-primary" type="submit">Enviar link</button>
      <a class="btn btn-success" href="{% url 'accounts:login' %}">Voltar ao login</a>
    </div>
  </form>
</section>
{% endblock %}
