{% extends "base/base.html" %}

{% block title %}Unidades{% endblock %}

{% block content %}
<section class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;gap:16px;">
    <h1 style="margin:0;">Unidades</h1>
    <a class="btn" href="{% url 'unidades:unidades_create' %}">Nova unidade</a>
  </div>

  <div style="overflow-x:auto;margin-top:16px;">
    <table style="width:100%;border-collapse:collapse;">
      <thead>
        <tr>
          <th style="text-align:left;padding:8px;">Nome</th>
          <th style="text-align:left;padding:8px;">Codigo</th>
          <th style="text-align:right;padding:8px;">Acoes</th>
        </tr>
      </thead>
      <tbody>
        {% for unidade in unidades %}
        <tr>
          <td style="padding:8px;">{{ unidade.nome }}</td>
          <td style="padding:8px;">{{ unidade.codigo }}</td>
          <td style="padding:8px;text-align:right;white-space:nowrap;">
            <a href="{% url 'unidades:unidades_update' unidade.pk %}">Editar</a>
            |
            <a href="{% url 'unidades:unidades_delete' unidade.pk %}">Excluir</a>
          </td>
        </tr>
        {% empty %}
        <tr>
          <td colspan="3" style="padding:8px;">Nenhuma unidade cadastrada.</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</section>
{% endblock %}
