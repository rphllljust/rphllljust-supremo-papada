{% if form.non_field_errors %}
  <div class="message message-error">{{ form.non_field_errors }}</div>
{% endif %}

{% for field in form %}
  <div class="form-field">
    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
    {{ field }}
    {% if field.errors %}
      <div class="form-error">{{ field.errors }}</div>
    {% endif %}
  </div>
{% endfor %}
