{% extends "base/base.html" %}

{% block title %}Nova senha | {{ APP_NAME }}{% endblock %}

{% block content %}
<section class="card section-box" style="max-width: 560px; margin: 24px auto;">
  <h2>Definir nova senha</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="button-row" style="margin-top: 16px;">
      <button class="btn btn-primary" type="submit">Salvar nova senha</button>
    </div>
  </form>
</section>
{% endblock %}
