{% extends "base/base.html" %}

{% block title %}Excluir matricula{% endblock %}

{% block content %}
<section class="card">
  <h1>Excluir matricula</h1>
  <p>Tem certeza que deseja excluir a matricula de <strong>{{ matricula.aluno.username }}</strong>?</p>

  <form method="post">
    {% csrf_token %}
    <div style="display:flex;gap:12px;">
      <button type="submit" class="btn">Confirmar exclusao</button>
      <a href="{% url 'matriculas:matriculas_list' %}">Cancelar</a>
    </div>
  </form>
</section>
{% endblock %}
