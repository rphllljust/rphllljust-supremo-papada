{% extends "base/base.html" %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<section class="card">
  <h1>{{ page_title }}</h1>

  <form method="post" novalidate>
    {% csrf_token %}
    {% for field in form %}
      <div style="margin-bottom:12px;">
        <label for="{{ field.id_for_label }}" style="display:block;margin-bottom:4px;">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
          <div style="color:#a12a2a;">{{ field.errors }}</div>
        {% endif %}
      </div>
    {% endfor %}

    <div style="display:flex;gap:12px;">
      <button type="submit" class="btn">Salvar</button>
      <a href="{% url 'matriculas:matriculas_list' %}">Cancelar</a>
    </div>
  </form>
</section>
{% endblock %}
