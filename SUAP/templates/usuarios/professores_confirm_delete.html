{% extends "base/base.html" %}

{% block title %}Excluir professor{% endblock %}

{% block content %}
<section class="card">
  <h1>Excluir professor</h1>
  <p>Tem certeza que deseja excluir <strong>{{ professor.first_name }} {{ professor.last_name }}</strong>?</p>

  <form method="post">
    {% csrf_token %}
    <div style="display:flex;gap:12px;">
      <button type="submit" class="btn">Confirmar exclusao</button>
      <a href="{% url 'usuarios:professores_list' %}">Cancelar</a>
    </div>
  </form>
</section>
{% endblock %}
