{% extends "base/base.html" %}

{% block title %}Excluir aluno{% endblock %}

{% block content %}
<section class="card">
  <h1>Excluir aluno</h1>
  <p>Tem certeza que deseja excluir <strong>{{ aluno.first_name }} {{ aluno.last_name }}</strong>?</p>

  <form method="post">
    {% csrf_token %}
    <div style="display:flex;gap:12px;">
      <button type="submit" class="btn">Confirmar exclusao</button>
      <a href="{% url 'usuarios:alunos_list' %}">Cancelar</a>
    </div>
  </form>
</section>
{% endblock %}
